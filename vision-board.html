<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>愿景板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  font-family:'Noto Serif SC',serif;
  height:100dvh;position:fixed;inset:0;
  background:linear-gradient(180deg,#f0ecd8 0%,#e4ecc8 25%,#d0e4b8 55%,#b8d8a0 80%,#a0cc90 100%);
  color:#4a3828;
}

/* 顶栏 */
.topbar{
  position:absolute;top:0;left:0;width:100%;z-index:20;
  padding-top:env(safe-area-inset-top,44px);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:12px;padding-right:12px;
  height:calc(env(safe-area-inset-top,44px) + 52px);
}
.back-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4a3828;}
.back-btn svg{width:20px;height:20px;}
.topbar-title{font-size:17px;letter-spacing:3px;color:#4a3828;}
.mode-toggle{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4a3828;}
.mode-toggle svg{width:20px;height:20px;}

/* 拼贴模式 */
.collage{
  position:absolute;top:calc(env(safe-area-inset-top,44px) + 52px);
  left:0;width:100%;bottom:0;
  overflow-y:auto;padding:12px;
  columns:2;column-gap:10px;
}
.collage-item{
  break-inside:avoid;margin-bottom:10px;border-radius:14px;overflow:hidden;
  position:relative;box-shadow:0 4px 16px rgba(0,0,0,0.3);
  animation:popIn 0.4s ease-out;
}
@keyframes popIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
.collage-item img{width:100%;display:block;}
.collage-item .del{
  position:absolute;top:6px;right:6px;
  width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,0.5);color:#fff;border:none;
  display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;
  opacity:0;transition:opacity 0.2s;
}
.collage-item:hover .del{opacity:1;}

/* 空状态 */
.empty{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:#9a8878;width:80%;
}
.empty-icon{font-size:52px;margin-bottom:16px;opacity:0.6;}
.empty-text{font-size:14px;line-height:2;letter-spacing:1px;}

/* 添加按钮 */
.fab{
  position:absolute;bottom:calc(env(safe-area-inset-bottom,20px) + 20px);
  right:20px;width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#e8b04a,#d89838);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(200,150,60,0.5);cursor:pointer;z-index:20;
  color:#fff;font-size:28px;
}

/* 幻灯片模式 */
.slideshow{
  position:absolute;inset:0;background:#000;z-index:30;
  display:none;align-items:center;justify-content:center;
}
.slideshow.active{display:flex;}
.slide-img{max-width:100%;max-height:100%;object-fit:contain;animation:slideFade 0.6s;}
@keyframes slideFade{from{opacity:0;}to{opacity:1;}}
.slide-close{position:absolute;top:calc(env(safe-area-inset-top,44px) + 12px);right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;cursor:pointer;z-index:32;}
.slide-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;z-index:32;}
.slide-prev{left:12px;}
.slide-next{right:12px;}
.slide-nav svg{width:22px;height:22px;}
.slide-dots{position:absolute;bottom:calc(env(safe-area-inset-bottom,20px) + 20px);left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:32;}
.slide-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);}
.slide-dot.active{background:#fff;}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="topbar-title">愿 景 板</div>
  <div class="mode-toggle" onclick="startSlideshow()" id="slideBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M10 9l5 3-5 3z" fill="currentColor"/></svg>
  </div>
</div>

<div class="collage" id="collage"></div>

<div class="empty" id="empty">
  <div class="empty-icon">✨</div>
  <div class="empty-text">把你向往的生活收藏进来<br>那些图片，是你正在成为的模样</div>
</div>

<div class="fab" onclick="document.getElementById('fileInput').click()">＋</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none;">

<!-- 幻灯片 -->
<div class="slideshow" id="slideshow">
  <div class="slide-close" onclick="closeSlideshow()">✕</div>
  <div class="slide-nav slide-prev" onclick="prevSlide()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <img class="slide-img" id="slideImg" src="">
  <div class="slide-nav slide-next" onclick="nextSlide()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="slide-dots" id="slideDots"></div>
</div>

<script>
let images=[];
try{ images=JSON.parse(localStorage.getItem('visionBoard')||'[]'); }catch(e){ images=[]; }

function save(){ localStorage.setItem('visionBoard',JSON.stringify(images)); }

function render(){
  const collage=document.getElementById('collage');
  const empty=document.getElementById('empty');
  collage.innerHTML='';
  if(images.length===0){ empty.style.display='block'; return; }
  empty.style.display='none';
  images.forEach((src,i)=>{
    const item=document.createElement('div');
    item.className='collage-item';
    item.innerHTML=`<img src="${src}" onclick="openSlideshow(${i})"><button class="del" onclick="event.stopPropagation();delImage(${i})">✕</button>`;
    collage.appendChild(item);
  });
}

document.getElementById('fileInput').onchange=(e)=>{
  const files=[...e.target.files];
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=(ev)=>{
      // 压缩图片避免localStorage爆
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const maxW=800;
        const scale=Math.min(1,maxW/img.width);
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        images.push(canvas.toDataURL('image/jpeg',0.75));
        loaded++;
        if(loaded===files.length){ save(); render(); }
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
};

function delImage(i){ images.splice(i,1); save(); render(); }

// 幻灯片
let slideIdx=0;
function startSlideshow(){ if(images.length===0)return; openSlideshow(0); }
function openSlideshow(i){
  slideIdx=i;
  document.getElementById('slideshow').classList.add('active');
  showSlide();
}
function showSlide(){
  document.getElementById('slideImg').src=images[slideIdx];
  const dots=document.getElementById('slideDots');
  dots.innerHTML='';
  images.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='slide-dot'+(i===slideIdx?' active':'');
    dots.appendChild(d);
  });
}
function nextSlide(){ slideIdx=(slideIdx+1)%images.length; showSlide(); }
function prevSlide(){ slideIdx=(slideIdx-1+images.length)%images.length; showSlide(); }
function closeSlideshow(){ document.getElementById('slideshow').classList.remove('active'); }

render();
</script>
</body>
</html>
